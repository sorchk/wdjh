version: 2

project_name: wdjh

builds:
  - id: wdjh
    main: ./cmd/multica
    dir: server
    binary: wdjh
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: wdjh
    repository:
      owner: multica-ai
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/multica-ai/wdjh"
    description: "wdjh CLI — local agent runtime and management tool for the wdjh platform"
    license: "Apache-2.0"
    install: |
      bin.install "wdjh"
    test: |
      system "#{bin}/wdjh", "version"
